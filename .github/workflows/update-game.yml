name: Update Space Shooter Game
on:
  schedule:
    - cron: '0 0 * * *'  # ทุกคืนเที่ยงคืน UTC
  workflow_dispatch:       # กดรันเองได้ด้วย

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # สำคัญมาก!
      - uses: czl9707/gh-space-shooter@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: 'game.gif'
          strategy: 'random'